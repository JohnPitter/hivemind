run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - revive
    - misspell
    - gofmt
    - goimports
    - bodyclose
    - nilerr
    - exhaustive

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
      - name: blank-imports
        severity: warning
      - name: unused-parameter
        severity: warning
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
  max-issues-per-linter: 50
  max-same-issues: 5

output:
  formats:
    - format: colored-line-number
  sort-results: true
