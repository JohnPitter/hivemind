# ============================================================================
# HiveMind E2E Integration Test Stack
# ============================================================================
# Usage:
#   make test-e2e           — Run API tests (32 assertions)
#   make test-e2e-scenario  — Run scenario test: full user flow (76 assertions)
# ============================================================================

services:
  # ── HiveMind API Server ────────────────────────────────────────────────
  hivemind:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - HIVEMIND_API_HOST=0.0.0.0
      - HIVEMIND_API_PORT=8080
      - HIVEMIND_LOG_FORMAT=json
      - HIVEMIND_LOG_LEVEL=debug
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "/hivemind", "health", "--quiet"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  # ── E2E API Tests ─────────────────────────────────────────────────────
  e2e-tests:
    profiles: ["api"]
    image: curlimages/curl:8.12.1
    depends_on:
      hivemind:
        condition: service_healthy
    volumes:
      - ./tests/e2e:/tests:ro
    entrypoint: ["sh", "/tests/run.sh"]
    environment:
      - API_URL=http://hivemind:8080

  # ── E2E Scenario Tests (Real User Flow) ─────────────────────────────
  scenario-tests:
    profiles: ["scenario"]
    image: curlimages/curl:8.12.1
    depends_on:
      hivemind:
        condition: service_healthy
    volumes:
      - ./tests/e2e:/tests:ro
    entrypoint: ["sh", "/tests/scenario.sh"]
    environment:
      - API_URL=http://hivemind:8080
