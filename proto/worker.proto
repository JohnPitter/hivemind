syntax = "proto3";

package hivemind.worker;

option go_package = "github.com/joaopedro/hivemind/gen/workerpb";

// WorkerService defines the gRPC interface between the Go orchestrator and the Python inference worker.
// The Go process spawns and manages the Python worker, communicating via local gRPC (localhost:50051).
service WorkerService {
  // Model management
  rpc LoadModel(LoadModelRequest) returns (LoadModelResponse);
  rpc UnloadModel(UnloadModelRequest) returns (UnloadModelResponse);

  // Status
  rpc GetStatus(StatusRequest) returns (StatusResponse);

  // Inference
  rpc ChatCompletion(ChatRequest) returns (ChatResponse);
  rpc ChatCompletionStream(ChatRequest) returns (stream ChatChunk);
  rpc ImageGeneration(ImageRequest) returns (ImageResponse);

  // Tensor parallelism (forward pass for distributed inference)
  rpc ForwardPass(ForwardRequest) returns (ForwardResponse);
}

// --- Model Management ---

message LoadModelRequest {
  string model_id = 1;
  repeated int32 layers = 2;       // Which layers this worker should load
  ModelType model_type = 3;

  enum ModelType {
    LLM = 0;
    DIFFUSION = 1;
  }
}

message LoadModelResponse {
  bool success = 1;
  string error = 2;
  ResourceUsage resources_used = 3;
}

message UnloadModelRequest {}

message UnloadModelResponse {
  bool success = 1;
}

// --- Status ---

message StatusRequest {}

message StatusResponse {
  WorkerState state = 1;
  string model_id = 2;
  repeated int32 loaded_layers = 3;
  ResourceUsage resources = 4;

  enum WorkerState {
    IDLE = 0;
    LOADING = 1;
    READY = 2;
    PROCESSING = 3;
    ERROR = 4;
  }
}

message ResourceUsage {
  int64 vram_total_mb = 1;
  int64 vram_used_mb = 2;
  int64 ram_total_mb = 3;
  int64 ram_used_mb = 4;
  string gpu_name = 5;
}

// --- Chat Inference ---

message ChatRequest {
  string request_id = 1;
  string model = 2;
  repeated ChatMessage messages = 3;
  float temperature = 4;
  int32 max_tokens = 5;
  bool stream = 6;
}

message ChatMessage {
  string role = 1;
  string content = 2;
}

message ChatResponse {
  string request_id = 1;
  string content = 2;
  UsageStats usage = 3;
}

message ChatChunk {
  string request_id = 1;
  string delta = 2;
  bool done = 3;
  UsageStats usage = 4;
}

// --- Image Inference ---

message ImageRequest {
  string request_id = 1;
  string model = 2;
  string prompt = 3;
  int32 width = 4;
  int32 height = 5;
  int32 steps = 6;
  float guidance_scale = 7;
}

message ImageResponse {
  string request_id = 1;
  bytes image_data = 2;
  string format = 3;    // "png", "jpeg"
}

// --- Usage Stats ---

message UsageStats {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

// --- Tensor Parallelism ---

message ForwardRequest {
  string request_id = 1;
  bytes tensor_data = 2;
  TensorMeta meta = 3;
  bool compressed = 4;     // zstd compressed
  bytes checksum = 5;      // SHA-256 for integrity
}

message ForwardResponse {
  string request_id = 1;
  bytes tensor_data = 2;
  TensorMeta meta = 3;
  bool compressed = 4;
  bytes checksum = 5;
  float duration_ms = 6;
}

message TensorMeta {
  repeated int64 shape = 1;
  string dtype = 2;          // "float16", "float32", "bfloat16"
  int32 from_layer = 3;
  int32 to_layer = 4;
}
