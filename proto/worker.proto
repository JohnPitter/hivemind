syntax = "proto3";

package hivemind.worker;

option go_package = "github.com/joaopedro/hivemind/gen/workerpb";

// WorkerService defines the gRPC interface between the Go orchestrator and the Python inference worker.
// The Go process spawns and manages the Python worker, communicating via local gRPC (localhost:50051).
service WorkerService {
  // Model management
  rpc LoadModel(LoadModelRequest) returns (LoadModelResponse);
  rpc UnloadModel(UnloadModelRequest) returns (UnloadModelResponse);

  // Status
  rpc GetStatus(StatusRequest) returns (StatusResponse);

  // Inference
  rpc ChatCompletion(ChatRequest) returns (ChatResponse);
  rpc ChatCompletionStream(ChatRequest) returns (stream ChatChunk);
  rpc ImageGeneration(ImageRequest) returns (ImageResponse);

  // Tensor parallelism (forward pass for distributed inference)
  rpc ForwardPass(ForwardRequest) returns (ForwardResponse);

  // Distributed token generation (autoregressive loop)
  rpc EmbedTokens(EmbedRequest) returns (EmbedResponse);
  rpc SampleTokens(SampleRequest) returns (SampleResponse);
}

// --- Model Management ---

message LoadModelRequest {
  string model_id = 1;
  repeated int32 layers = 2;       // Which layers this worker should load
  ModelType model_type = 3;

  enum ModelType {
    LLM = 0;
    DIFFUSION = 1;
  }
}

message LoadModelResponse {
  bool success = 1;
  string error = 2;
  ResourceUsage resources_used = 3;
}

message UnloadModelRequest {}

message UnloadModelResponse {
  bool success = 1;
}

// --- Status ---

message StatusRequest {}

message StatusResponse {
  WorkerState state = 1;
  string model_id = 2;
  repeated int32 loaded_layers = 3;
  ResourceUsage resources = 4;

  enum WorkerState {
    IDLE = 0;
    LOADING = 1;
    READY = 2;
    PROCESSING = 3;
    ERROR = 4;
  }
}

message ResourceUsage {
  int64 vram_total_mb = 1;
  int64 vram_used_mb = 2;
  int64 ram_total_mb = 3;
  int64 ram_used_mb = 4;
  string gpu_name = 5;
}

// --- Chat Inference ---

message ChatRequest {
  string request_id = 1;
  string model = 2;
  repeated ChatMessage messages = 3;
  float temperature = 4;
  int32 max_tokens = 5;
  bool stream = 6;
}

message ChatMessage {
  string role = 1;
  string content = 2;
}

message ChatResponse {
  string request_id = 1;
  string content = 2;
  UsageStats usage = 3;
}

message ChatChunk {
  string request_id = 1;
  string delta = 2;
  bool done = 3;
  UsageStats usage = 4;
}

// --- Image Inference ---

message ImageRequest {
  string request_id = 1;
  string model = 2;
  string prompt = 3;
  int32 width = 4;
  int32 height = 5;
  int32 steps = 6;
  float guidance_scale = 7;
}

message ImageResponse {
  string request_id = 1;
  bytes image_data = 2;
  string format = 3;    // "png", "jpeg"
}

// --- Usage Stats ---

message UsageStats {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

// --- Tensor Parallelism ---

message ForwardRequest {
  string request_id = 1;
  bytes tensor_data = 2;
  TensorMeta meta = 3;
  bool compressed = 4;     // zstd compressed
  bytes checksum = 5;      // SHA-256 for integrity
  bool use_cache = 6;      // reuse KV cache from previous steps
  int32 cache_seq_len = 7; // current sequence length for position encoding
}

message ForwardResponse {
  string request_id = 1;
  bytes tensor_data = 2;
  TensorMeta meta = 3;
  bool compressed = 4;
  bytes checksum = 5;
  float duration_ms = 6;
  int32 cache_seq_len = 7; // updated sequence length after this pass
}

message TensorMeta {
  repeated int64 shape = 1;
  string dtype = 2;          // "float16", "float32", "bfloat16"
  int32 from_layer = 3;
  int32 to_layer = 4;
}

// --- Distributed Token Generation ---

message EmbedRequest {
  string request_id = 1;
  repeated int32 token_ids = 2;  // Token IDs to embed (used for subsequent tokens)
  string text = 3;               // Raw text to tokenize+embed (used for initial prompt)
  string model_id = 4;
}

message EmbedResponse {
  string request_id = 1;
  bytes hidden_states = 2;       // Serialized hidden states tensor
  TensorMeta meta = 3;
  repeated int32 token_ids = 4;  // Tokenized IDs (returned when text was provided)
  int32 vocab_size = 5;
}

message SampleRequest {
  string request_id = 1;
  bytes logits = 2;              // Serialized logits tensor
  TensorMeta meta = 3;
  float temperature = 4;
  float top_p = 5;
  int32 top_k = 6;
  repeated int32 eos_token_ids = 7;
}

message SampleResponse {
  string request_id = 1;
  int32 token_id = 2;
  string token_text = 3;
  bool is_eos = 4;
  float token_prob = 5;
}
