# ============================================================================
# HiveMind Production Stack — 1,000 concurrent users
# ============================================================================
# Deploy: docker compose -f deploy/production/docker-compose.yml up -d
#
# Architecture:
#   nginx (LB) → hivemind × 2 (API) → redis (session/room state)
#
# Hardware requirements (minimum):
#   - 4 vCPU, 16GB RAM, 100GB SSD
#   - GPU: NVIDIA with ≥8GB VRAM per hivemind instance
#   - Network: 1 Gbps (tensor transfers are bandwidth-intensive)
# ============================================================================

services:
  # ── Reverse Proxy & Load Balancer ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      hivemind-1:
        condition: service_healthy
      hivemind-2:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - hivemind-net

  # ── HiveMind Instance 1 ───────────────────────────────────────────────
  hivemind-1:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      - HIVEMIND_API_HOST=0.0.0.0
      - HIVEMIND_API_PORT=8080
      - HIVEMIND_LOG_FORMAT=json
      - HIVEMIND_LOG_LEVEL=info
      - HIVEMIND_SIGNALING_URL=${SIGNALING_URL:-ws://signaling:9090}
      - HIVEMIND_REDIS_URL=redis://redis:6379/0
    ports:
      - "51820:51820/udp"
    volumes:
      - hivemind-data-1:/var/lib/hivemind
    healthcheck:
      test: ["CMD", "/hivemind", "health", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - hivemind-net

  # ── HiveMind Instance 2 ───────────────────────────────────────────────
  hivemind-2:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      - HIVEMIND_API_HOST=0.0.0.0
      - HIVEMIND_API_PORT=8080
      - HIVEMIND_LOG_FORMAT=json
      - HIVEMIND_LOG_LEVEL=info
      - HIVEMIND_SIGNALING_URL=${SIGNALING_URL:-ws://signaling:9090}
      - HIVEMIND_REDIS_URL=redis://redis:6379/0
    ports:
      - "51821:51820/udp"
    volumes:
      - hivemind-data-2:/var/lib/hivemind
    healthcheck:
      test: ["CMD", "/hivemind", "health", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - hivemind-net

  # ── Redis (Room state + Session store) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
    networks:
      - hivemind-net

volumes:
  hivemind-data-1:
  hivemind-data-2:
  redis-data:

networks:
  hivemind-net:
    driver: bridge
