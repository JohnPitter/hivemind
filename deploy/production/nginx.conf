# ============================================================================
# HiveMind Production Nginx — Reverse Proxy for 1,000 concurrent users
# ============================================================================
# Sizing: 1k users × ~5 req/s peak = 5k req/s capacity needed
# Worker processes auto-detect CPU cores, 4096 connections per worker
# ============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic Settings ───────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging (JSON for structured log aggregation) ────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/html
        image/svg+xml;

    # ── Rate Limiting Zones ──────────────────────────────────────────────
    # API: 50 req/s per IP with burst of 100
    limit_req_zone $binary_remote_addr zone=api:20m rate=50r/s;
    # Inference: 10 req/s per IP (heavy endpoint)
    limit_req_zone $binary_remote_addr zone=inference:10m rate=10r/s;
    # General: 100 req/s per IP
    limit_req_zone $binary_remote_addr zone=general:20m rate=100r/s;

    # ── Connection Limits ────────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Upstream: HiveMind instances ─────────────────────────────────────
    upstream hivemind_api {
        least_conn;
        server hivemind-1:8080 max_fails=3 fail_timeout=30s;
        server hivemind-2:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check bypass (no redirect for LB probes)
        location /health {
            proxy_pass http://hivemind_api;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS Configuration
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # Security Headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Connection limit per IP
        limit_conn addr 50;

        # Max body size for tensor payloads
        client_max_body_size 64m;

        # ── OpenAI-compatible API ────────────────────────────────────────
        location /v1/chat/completions {
            limit_req zone=inference burst=20 nodelay;

            proxy_pass http://hivemind_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
        }

        location /v1/images/generations {
            limit_req zone=inference burst=10 nodelay;

            proxy_pass http://hivemind_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }

        location /v1/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://hivemind_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Room management API ──────────────────────────────────────────
        location /room/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://hivemind_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Internal API (dashboard) ────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://hivemind_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health & Metrics ─────────────────────────────────────────────
        location /health {
            proxy_pass http://hivemind_api;
            proxy_set_header Host $host;
            access_log off;
        }

        location /metrics {
            # Restrict metrics to internal networks
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://hivemind_api;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Static files (SPA) ──────────────────────────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://hivemind_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                proxy_pass http://hivemind_api;
                proxy_set_header Host $host;
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }
    }
}
